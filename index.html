<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraza 3D — geometría a escala</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#04081e;font-family:system-ui,Segoe UI,Arial,sans-serif}
  #hud{position:fixed;top:14px;left:14px;z-index:10;background:rgba(8,12,28,.84);border:1px solid #34406e;
       border-radius:12px;padding:13px 16px;color:#dce4ff;max-width:330px;backdrop-filter:blur(6px)}
  #hud h1{font-size:14.5px;margin:0;color:#ffd98a}
  #hudHead{display:flex;align-items:center;justify-content:space-between;gap:10px}
  #hud #btnMin{padding:1px 10px;font-size:15px;line-height:1.3;flex:0 0 auto}
  #hud.min #hudBody{display:none}
  #hud.min{padding:8px 12px;max-width:240px}
  #hud.min h1{font-size:12px}
  @media (max-width:640px){
    #hud{max-width:235px;padding:9px 11px}
    #hud h1{font-size:11.5px}
    #hud p{font-size:10px}
    #hud button{padding:4px 8px;font-size:11px}
    .sld label{font-size:11px}
    #hint{display:none}
  }
  #hud p{font-size:11.5px;margin:5px 0;line-height:1.4;color:#aab6e0}
  #hud .btns{display:flex;gap:7px;margin:9px 0 4px;flex-wrap:wrap}
  #hud button{background:#1d2a52;color:#e8edff;border:1px solid #44549a;border-radius:8px;
       padding:6px 11px;font-size:12px;cursor:pointer}
  #hud button:hover{background:#2a3a6e}
  #hud button.on{background:#caa24a;color:#1a1405;border-color:#e8c97a;font-weight:600}
  .sld{margin:9px 0 2px}
  .sld label{display:flex;justify-content:space-between;font-size:12px;color:#cfd9ff;margin-bottom:2px}
  .sld span{color:#ffd98a;font-weight:600}
  .sld input{width:100%;accent-color:#caa24a}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;color:#8fa0d8;
       font-size:12px;background:rgba(8,12,28,.7);padding:6px 14px;border-radius:20px;border:1px solid #2a3460}
</style>
</head>
<body>
<div id="hud">
  <div id="hudHead">
    <h1>Terraza — 3D a escala (4.00 × 9.24 m)</h1>
    <button id="btnMin" title="minimizar/expandir">—</button>
  </div>
  <div id="hudBody">
  <div class="btns">
    <button id="btnOrbit" class="on">🔄 Orbital</button>
    <button id="btnWalk">🚶 Recorrido</button>
    <button id="btnDims">📐 Medidas</button>
    <button id="btnL">🧱 Mesada L</button>
    <button id="btnLuz" class="on">💡 Apliques</button>
  </div>
  <div class="sld">
    <label>🕘 Hora del día <span id="outHora">21:00</span></label>
    <input id="rngHora" type="range" min="0" max="24" step="0.25" value="21">
  </div>
  <div class="sld">
    <label>↔️ Pérgola (ruedas) <span id="outPerg">al fondo</span></label>
    <input id="rngPerg" type="range" min="-0.33" max="4.1" step="0.02" value="0">
  </div>
  <div class="sld">
    <label>🍃 Aspas bioclimáticas <span id="outAspas">70% abiertas</span></label>
    <input id="rngAspas" type="range" min="0" max="1" step="0.01" value="0.7">
  </div>
  <div class="sld">
    <label>🛋️ Sofá (lado de la L) <span id="outSofa">2.15 m · ~5 pers.</span></label>
    <input id="rngSofa" type="range" min="1.25" max="2.8" step="0.05" value="2.15">
  </div>
  <p id="modeHelp">Arrastrá = rotar · rueda = zoom · click derecho = desplazar</p>
  <p>N = derecha · fondo = Oeste · de noche la mesa ratona se vuelve fogón 🔥</p>
  </div>
</div>
<div id="hint">Medidas en el bloque <b>DIM</b> del archivo · pérgola bioclimática con ruedas: movela con la barrita</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ============================================================
   DIM — medidas reales en metros. +x = NORTE, -z = OESTE (fondo)
   ============================================================ */
const DIM = {
  W: 4.00, D: 9.24,
  hParedIzq: 2.60, hParedIzqFte: 1.80,
  hParedFondo: 1.10, hParapeto: 1.70,
  mesadaL: 3.60, mesadaProf: 0.65, mesadaH: 0.92,   // mesada hasta la pared del fondo
  soffitH: 2.42, pergolaH: 2.42,
  techoProf: 1.00, pergolaW: 3.00, pergolaD: 3.00,
  zLavadero: 7.66, lavW: 1.93, lavL: 1.58,
  tile: 0.60
};
const W = DIM.W, D = DIM.D;

/* ---------- base ---------- */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.05, 160);
/* encuadre inicial: como la foto de referencia (de pie, mirando cocina + pérgola) */
camera.position.set(2.75, 1.62, 7.05);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
const LITE = new URLSearchParams(location.search).has('lite');
const SMALL = Math.min(innerWidth, innerHeight) < 700;   // celulares: menos resolución, misma calidad visual
renderer.setPixelRatio(LITE ? 0.75 : (SMALL ? 1.1 : Math.min(devicePixelRatio, 1.5)));
renderer.shadowMap.enabled = !LITE;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

/* entorno PBR: reflejos suaves en piedra, metal y vidrio */
if(!LITE){
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
  pmrem.dispose();
}
scene.fog = new THREE.Fog(0x0a1230, 16, 60);

const orbit = new OrbitControls(camera, renderer.domElement);
orbit.target.set(1.35, 1.1, 1.2);
orbit.enableDamping = true;
orbit.maxPolarAngle = Math.PI*0.495;
orbit.minDistance = 0.8; orbit.maxDistance = 24;
/* zoom de rueda propio: proporcional al delta y amortiguado — funciona igual
   con rueda a clicks, rueda libre y touchpad (el pinch táctil sigue siendo nativo) */
let zoomTarget = null, lastWheelT = -10;
addEventListener('wheel', e => {
  if(e.target !== renderer.domElement || !e.isTrusted) return;
  e.preventDefault(); e.stopPropagation();
  if(plc.isLocked) return;
  const dy = e.deltaMode === 1 ? e.deltaY*33 : e.deltaY;
  if(zoomTarget === null) zoomTarget = camera.position.distanceTo(orbit.target);
  zoomTarget = THREE.MathUtils.clamp(zoomTarget * Math.pow(1.0009, dy), orbit.minDistance, orbit.maxDistance);
  lastWheelT = clock.elapsedTime;
}, { passive:false, capture:true });

/* ---------- helpers ---------- */
function canvasTex(w, h, draw){
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = LITE ? 1 : 4;
  return t;
}
function bumpTex(w, h, draw){
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  return new THREE.CanvasTexture(c);
}
function grain(ctx, w, h, n, alpha){
  for(let i=0;i<n;i++){
    const g = 90+Math.random()*120|0;
    ctx.fillStyle = `rgba(${g},${g},${g},${alpha})`;
    ctx.fillRect(Math.random()*w, Math.random()*h, 1.6, 1.6);
  }
}
function box(w, h, d, mat, x, y, z, parent = scene){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
  parent.add(m); return m;
}
function rbox(w, h, d, r, mat, x, y, z, parent = scene){
  const m = new THREE.Mesh(new RoundedBoxGeometry(w, h, d, 3, r), mat);
  m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
  parent.add(m); return m;
}

/* ============================================================
   TEXTURAS PROCEDURALES (alta calidad, sin descargas)
   ============================================================ */
/* piso: piedra beige 60×60 con vetas y variación por baldosa */
const floorTex = canvasTex(1024, 1024, (ctx,w,h)=>{
  for(let ty=0; ty<2; ty++) for(let tx=0; tx<2; tx++){
    const ox = tx*512, oy = ty*512;
    const base = 150 + Math.random()*16;
    ctx.fillStyle = `rgb(${base+12|0},${base|0},${base-18|0})`;
    ctx.fillRect(ox, oy, 512, 512);
    for(let v=0; v<9; v++){                                  // vetas
      let x = ox+Math.random()*512, y = oy+Math.random()*512;
      ctx.strokeStyle = `rgba(118,106,90,${0.10+Math.random()*0.12})`;
      ctx.lineWidth = 1 + Math.random()*2;
      ctx.beginPath(); ctx.moveTo(x,y);
      for(let s=0; s<26; s++){ x += (Math.random()-0.5)*46; y += (Math.random()-0.5)*46;
        ctx.lineTo(Math.max(ox,Math.min(ox+512,x)), Math.max(oy,Math.min(oy+512,y))); }
      ctx.stroke();
    }
    for(let i=0;i<700;i++){
      const g = 120+Math.random()*70|0;
      ctx.fillStyle = `rgba(${g},${g-8},${g-22},0.25)`;
      ctx.fillRect(ox+Math.random()*512, oy+Math.random()*512, 2, 2);
    }
  }
  ctx.strokeStyle = '#6e6254'; ctx.lineWidth = 6;
  ctx.strokeRect(0,0,w,h);
  ctx.beginPath(); ctx.moveTo(512,0); ctx.lineTo(512,h); ctx.moveTo(0,512); ctx.lineTo(w,512); ctx.stroke();
});
const floorBump = bumpTex(1024, 1024, (ctx,w,h)=>{
  ctx.fillStyle = '#888'; ctx.fillRect(0,0,w,h);
  grain(ctx, w, h, 5000, 0.3);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 7;
  ctx.strokeRect(0,0,w,h);
  ctx.beginPath(); ctx.moveTo(512,0); ctx.lineTo(512,h); ctx.moveTo(0,512); ctx.lineTo(w,512); ctx.stroke();
});
[floorTex, floorBump].forEach(t => { t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(W/1.2, D/1.2); });

/* estuco para paredes */
function stuccoPair(tint){
  const map = canvasTex(512, 512, (ctx,w,h)=>{
    ctx.fillStyle = tint; ctx.fillRect(0,0,w,h);
    for(let i=0;i<46;i++){
      const x=Math.random()*w, y=Math.random()*h, r=18+Math.random()*60;
      const g=ctx.createRadialGradient(x,y,2,x,y,r);
      g.addColorStop(0, `rgba(255,250,240,${Math.random()*0.05})`);
      g.addColorStop(1, 'rgba(120,110,95,0.04)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
    }
    grain(ctx,w,h,2600,0.06);
  });
  const bump = bumpTex(512, 512, (ctx,w,h)=>{
    ctx.fillStyle='#808080'; ctx.fillRect(0,0,w,h); grain(ctx,w,h,5200,0.4);
  });
  map.wrapS=map.wrapT=bump.wrapS=bump.wrapT=THREE.RepeatWrapping;
  return { map, bump };
}
const stucco = stuccoPair('#c9b6a0');
const blancoT = stuccoPair('#e9e3d6');

/* chapa trapezoidal gris (perímetro) — 8 pliegues por tile, 0.16 m c/u */
const chapaMapBase = canvasTex(512, 256, (ctx,w,h)=>{
  for(let r=0; r<8; r++){
    const ox = r*64;
    ctx.fillStyle = '#878b90'; ctx.fillRect(ox, 0, 32, h);          // cara ancha
    let g = ctx.createLinearGradient(ox+32,0,ox+40,0);              // flanco en sombra
    g.addColorStop(0,'#5e6267'); g.addColorStop(1,'#75797e');
    ctx.fillStyle = g; ctx.fillRect(ox+32, 0, 8, h);
    ctx.fillStyle = '#9aa0a5'; ctx.fillRect(ox+40, 0, 16, h);       // cresta
    g = ctx.createLinearGradient(ox+56,0,ox+64,0);                  // flanco con luz
    g.addColorStop(0,'#b6bbc0'); g.addColorStop(1,'#868a8f');
    ctx.fillStyle = g; ctx.fillRect(ox+56, 0, 8, h);
    ctx.fillStyle = 'rgba(220,226,232,0.5)'; ctx.fillRect(ox+56, 0, 1.6, h);
    for(let s=0; s<5; s++){                                          // vetas verticales sutiles
      ctx.fillStyle = `rgba(${50+Math.random()*40|0},${54+Math.random()*40|0},${58+Math.random()*40|0},0.07)`;
      ctx.fillRect(ox+Math.random()*62, 0, 1.2, h);
    }
  }
  for(let i=0;i<5;i++){                                              // bandas de desgaste
    ctx.fillStyle = `rgba(40,44,48,${0.02+Math.random()*0.03})`;
    ctx.fillRect(0, Math.random()*h, w, 6+Math.random()*22);
  }
});
const chapaBumpBase = bumpTex(512, 256, (ctx,w,h)=>{
  for(let r=0; r<8; r++){
    const ox = r*64;
    ctx.fillStyle = '#5a5a5a'; ctx.fillRect(ox, 0, 32, h);
    let g = ctx.createLinearGradient(ox+32,0,ox+40,0);
    g.addColorStop(0,'#5a5a5a'); g.addColorStop(1,'#d8d8d8');
    ctx.fillStyle = g; ctx.fillRect(ox+32, 0, 8, h);
    ctx.fillStyle = '#d8d8d8'; ctx.fillRect(ox+40, 0, 16, h);
    g = ctx.createLinearGradient(ox+56,0,ox+64,0);
    g.addColorStop(0,'#d8d8d8'); g.addColorStop(1,'#5a5a5a');
    ctx.fillStyle = g; ctx.fillRect(ox+56, 0, 8, h);
  }
});
function chapaMat(len, hgt){
  const map = chapaMapBase.clone();  map.needsUpdate = true;
  const bmp = chapaBumpBase.clone(); bmp.needsUpdate = true;
  [map, bmp].forEach(t => { t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(len/1.28, Math.max(1, hgt/1.28)); });
  return new THREE.MeshStandardMaterial({ map, bumpMap:bmp, bumpScale:0.028, roughness:0.48, metalness:0.42 });
}

/* madera con veta para frentes y deck del sofá */
const woodTex = canvasTex(512, 512, (ctx,w,h)=>{
  ctx.fillStyle = '#7c4e26'; ctx.fillRect(0,0,w,h);
  for(let p=0; p<8; p++){
    ctx.fillStyle = `rgba(${70+Math.random()*40|0},${40+Math.random()*22|0},${16+Math.random()*12|0},0.55)`;
    ctx.fillRect(p*64, 0, 60, h);
    for(let v=0; v<10; v++){
      let x = p*64 + Math.random()*60, y = 0;
      ctx.strokeStyle = `rgba(38,22,10,${0.15+Math.random()*0.2})`;
      ctx.lineWidth = 0.8 + Math.random();
      ctx.beginPath(); ctx.moveTo(x, 0);
      for(let s=0; s<10; s++){ y += 51; x += (Math.random()-0.5)*7; ctx.lineTo(x, y); }
      ctx.stroke();
    }
    ctx.fillStyle = 'rgba(20,12,6,0.8)'; ctx.fillRect(p*64+60, 0, 4, h);
  }
});
woodTex.wrapS = woodTex.wrapT = THREE.RepeatWrapping;
const woodMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.72 });

/* mármol travertino para la mesada */
const stoneTex = canvasTex(512, 512, (ctx,w,h)=>{
  ctx.fillStyle = '#ddd5c5'; ctx.fillRect(0,0,w,h);
  for(let v=0; v<26; v++){
    ctx.strokeStyle = `rgba(180,168,148,${0.12+Math.random()*0.14})`;
    ctx.lineWidth = 1+Math.random()*3;
    ctx.beginPath();
    let y = Math.random()*h;
    ctx.moveTo(0, y);
    for(let x=0; x<=w; x+=32){ y += (Math.random()-0.5)*9; ctx.lineTo(x, y); }
    ctx.stroke();
  }
  grain(ctx,w,h,1500,0.05);
});

/* tela para almohadones */
const fabricBump = bumpTex(256, 256, (ctx,w,h)=>{
  ctx.fillStyle='#808080'; ctx.fillRect(0,0,w,h);
  for(let y=0;y<h;y+=3){ ctx.fillStyle = y%6 ? '#8a8a8a' : '#757575'; ctx.fillRect(0,y,w,1.4); }
  for(let x=0;x<w;x+=3){ ctx.fillStyle = x%6 ? 'rgba(140,140,140,.5)' : 'rgba(110,110,110,.5)'; ctx.fillRect(x,0,1.4,h); }
  grain(ctx,w,h,900,0.25);
});
fabricBump.wrapS = fabricBump.wrapT = THREE.RepeatWrapping;

/* estampa de hojas para 2 almohadones (como la foto) */
const leafPrintTex = canvasTex(256, 256, (ctx,w,h)=>{
  ctx.fillStyle = '#cfc7a6'; ctx.fillRect(0,0,w,h);
  for(let i=0;i<14;i++){
    const x=Math.random()*w, y=Math.random()*h, a=Math.random()*Math.PI, s=14+Math.random()*16;
    ctx.save(); ctx.translate(x,y); ctx.rotate(a);
    ctx.fillStyle = `rgba(90,110,58,${0.5+Math.random()*0.4})`;
    ctx.beginPath(); ctx.ellipse(0,0,s*0.34,s,0,0,7); ctx.fill();
    ctx.strokeStyle = 'rgba(60,76,38,0.8)'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,s); ctx.stroke();
    ctx.restore();
  }
});

/* llama (para horno, parrilla y fogón) */
const flameTex = canvasTex(64, 128, (ctx,w,h)=>{
  ctx.clearRect(0,0,w,h);
  const g = ctx.createRadialGradient(w/2, h*0.78, 3, w/2, h*0.62, h*0.62);
  g.addColorStop(0, 'rgba(255,236,170,0.95)');
  g.addColorStop(0.3, 'rgba(255,160,60,0.85)');
  g.addColorStop(0.65, 'rgba(255,90,20,0.45)');
  g.addColorStop(1, 'rgba(255,60,10,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(w/2, 4);
  ctx.quadraticCurveTo(w*0.92, h*0.55, w*0.62, h*0.94);
  ctx.lineTo(w*0.38, h*0.94);
  ctx.quadraticCurveTo(w*0.08, h*0.55, w/2, 4);
  ctx.fill();
});
const flamePlanes = [];
function addFlame(x, y, z, s, parent = scene){
  const g = new THREE.Group();
  for(let i=0;i<2;i++){
    const m = new THREE.Mesh(new THREE.PlaneGeometry(s, s*2),
      new THREE.MeshBasicMaterial({ map: flameTex, transparent:true, depthWrite:false,
        blending:THREE.AdditiveBlending, side:THREE.DoubleSide }));
    m.rotation.y = i*Math.PI/2;
    g.add(m);
  }
  g.position.set(x, y, z);
  g.userData.ph = Math.random()*7;
  parent.add(g); flamePlanes.push(g);
  return g;
}

/* ---------- materiales ---------- */
const M = {
  stucco:   new THREE.MeshStandardMaterial({ map:stucco.map, bumpMap:stucco.bump, bumpScale:0.012, roughness:0.92 }),
  stuccoCap:new THREE.MeshStandardMaterial({ color:0x74787c, roughness:0.45, metalness:0.5 }),
  blanco:   new THREE.MeshStandardMaterial({ map:blancoT.map, bumpMap:blancoT.bump, bumpScale:0.01, roughness:0.9 }),
  stone:    new THREE.MeshStandardMaterial({ map:stoneTex, roughness:0.32 }),
  pier:     new THREE.MeshStandardMaterial({ color:0xcfc4b2, roughness:0.85 }),
  metal:    new THREE.MeshStandardMaterial({ color:0x26262b, roughness:0.38, metalness:0.85 }),
  metalDark:new THREE.MeshStandardMaterial({ color:0x17171b, roughness:0.34, metalness:0.9 }),
  wood:     woodMat,
  cushion:  new THREE.MeshStandardMaterial({ color:0xddd2bf, bumpMap:fabricBump, bumpScale:0.006, roughness:0.96 }),
  pot:      new THREE.MeshStandardMaterial({ color:0x1f1f22, roughness:0.55, metalness:0.2 }),
  leaf:     new THREE.MeshStandardMaterial({ color:0x3f6b35, roughness:0.85, side:THREE.DoubleSide }),
  log:      new THREE.MeshStandardMaterial({ color:0xc69d62, roughness:0.95 })
};

/* ---------- cielo día/noche + estrellas ---------- */
const skyUni = { uDay: { value: 0.0 } };
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(70, 24, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false, uniforms: skyUni,
    vertexShader: `varying vec3 vP; void main(){ vP = position; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vP; uniform float uDay;
      void main(){
        float h = clamp(normalize(vP).y*1.5, 0.0, 1.0);
        vec3 nocheHor = vec3(0.10,0.16,0.36), nocheZen = vec3(0.012,0.03,0.12);
        vec3 diaHor   = vec3(0.74,0.83,0.93), diaZen   = vec3(0.22,0.45,0.80);
        vec3 hor = mix(nocheHor, diaHor, uDay), zen = mix(nocheZen, diaZen, uDay);
        vec3 col = mix(hor, zen, h);
        col += vec3(0.22,0.11,0.03) * pow(max(0.0, 1.0-abs(normalize(vP).y*3.0)), 3.0) * (1.0-uDay*0.75);
        gl_FragColor = vec4(col, 1.0);
      }`
  })
));
let starsMat;
{
  const n = 350, pos = new Float32Array(n*3);

  [...sofaG.children].forEach(c => { if(c.geometry) c.geometry.dispose(); sofaG.remove(c); });
  [...sofaDims.children].forEach(c => {
    if(c.geometry) c.geometry.dispose();
    if(c.isSprite){ if(c.material.map) c.material.map.dispose(); c.material.dispose(); }
    sofaDims.remove(c);
  });
  envMats.add(M.cushion); envMats.add(M.wood); pillowMats.forEach(m => envMats.add(m));
  const prof = 0.65, span = lado - prof;
  box(lado, 0.22, prof, M.wood, W-lado/2, 0.21, prof/2, sofaG);
  box(prof, 0.22, span, M.wood, W-prof/2, 0.21, prof+span/2, sofaG);
  const n = Math.max(1, Math.round(span/0.75));
  const cw = span/n - 0.02;
  for(let i=0;i<n;i++){
    const cx = W-lado + span*(i+0.5)/n;
    rbox(cw, 0.18, 0.61, 0.045, M.cushion, cx, 0.41, 0.325, sofaG);
    const b = rbox(cw, 0.44, 0.16, 0.05, M.cushion, cx, 0.74, 0.13, sofaG); b.rotation.x = -0.12;
    const cz = prof + span*(i+0.5)/n;
    rbox(0.61, 0.18, cw, 0.045, M.cushion, W-0.325, 0.41, cz, sofaG);
    const b2 = rbox(0.16, 0.44, cw, 0.05, M.cushion, W-0.14, 0.74, cz, sofaG); b2.rotation.z = 0.12;
  }
  rbox(0.61, 0.18, 0.61, 0.045, M.cushion, W-0.325, 0.41, 0.325, sofaG);
  const c1 = rbox(0.61, 0.44, 0.16, 0.05, M.cushion, W-0.325, 0.74, 0.13, sofaG); c1.rotation.x = -0.12;
  const c2 = rbox(0.16, 0.44, 0.61, 0.05, M.cushion, W-0.14, 0.74, 0.325, sofaG); c2.rotation.z = 0.12;
  /* almohadones decorativos proporcionales */
  const pSpec = [[W-lado+span*0.22, 0.62, 0.2, 0], [W-lado+span*0.6, 0.6, 0.22, 0.3],
                 [W-0.33, 0.62, 0.3, 0.8], [W-0.22, 0.62, prof+span*0.35, 1.5], [W-0.24, 0.6, prof+span*0.8, 1.7]];
  if(span > 1.4) pSpec.push([W-lado+span*0.88, 0.62, 0.2, -0.2]);
  pSpec.forEach(([x,y,z,ry], i) => {
    const pl = rbox(0.38, 0.38, 0.13, 0.05, pillowMats[i%5], x, y, z, sofaG);
    pl.rotation.y = ry; pl.rotation.x = -0.15;
  });
  /* cotas dinámicas */
  dimension(V(W-lado,0.52,0.85), V(W,0.52,0.85), 'sofá ' + lado.toFixed(2) + ' m', new THREE.Vector3(0,0.1,0), false, 0.3, sofaDims);
  dimension(V(3.2,0.52,0), V(3.2,0.52,lado), 'sofá ' + lado.toFixed(2) + ' m', new THREE.Vector3(0.08,0,0), false, 0.3, sofaDims);
  /* la columna de la pérgola y la maceta se corren para no chocar */
  const pz = Math.max(2.30, lado + 0.18);
  postBR.forEach(o => o.m.position.z = pz + o.dz);
  potG.position.z = Math.max(0, lado + 0.75 - 2.95);
}

const bulbMat = new THREE.MeshBasicMaterial({ color:0xffdba8 });
const wireMat = new THREE.MeshStandardMaterial({ color:0x0c0c0c, roughness:0.6 });
function strand(a, b, sag, nBulbs, parent = scene){
  const pts = [];
  for(let i=0;i<=24;i++){
    const t = i/24, p = a.clone().lerp(b, t);
    p.y -= sag*Math.sin(Math.PI*t); pts.push(p);
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  parent.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 36, 0.007, 6), wireMat));
  for(let i=0;i<nBulbs;i++){
    const p = curve.getPoint((i+0.5)/nBulbs);
    const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.004,0.004,0.07,4), wireMat);
    wire.position.set(p.x, p.y-0.035, p.z); parent.add(wire);
    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.029, 12, 10), bulbMat);
    bulb.position.set(p.x, p.y-0.09, p.z); parent.add(bulb);
    const sm = new THREE.SpriteMaterial({ map: glowTex, color:0xffbb66, transparent:true,
      blending:THREE.AdditiveBlending, depthWrite:false });
    const spr = new THREE.Sprite(sm);
    spr.scale.set(0.24,0.24,1); spr.position.copy(bulb.position); parent.add(spr);
    glowMats.push(sm);
  }
}

const frondTex = canvasTex(256, 64, (ctx,w,h)=>{
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = '#1f3d1c'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();
  ctx.fillStyle = '#2c5226';
  for(let x=8; x<w-4; x+=6){
    const len = 25*(1 - Math.abs(x-w*0.45)/(w*0.62));
    ctx.beginPath(); ctx.ellipse(x, h/2-len/2, 2.3, len/2, -0.35, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x, h/2+len/2, 2.3, len/2, 0.35, 0, Math.PI*2); ctx.fill();
  }
});
function palm(x, z, h){
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.15, h, 8),
    new THREE.MeshStandardMaterial({ color:0x4a3a26, roughness:1 }));
  trunk.position.y = h/2; trunk.castShadow = true; g.add(trunk);
  const fg = new THREE.PlaneGeometry(1.8, 0.42); fg.translate(0.9, 0, 0);
  const fm = new THREE.MeshStandardMaterial({ map:frondTex, transparent:true, alphaTest:0.35,
    side:THREE.DoubleSide, color:0x9fbf90, roughness:1,
    emissive:0x1a2c12, emissiveIntensity:0.7 });
  for(let i=0;i<11;i++){
    const f = new THREE.Mesh(fg, fm);
    f.position.y = h;
    f.rotation.y = i*(Math.PI*2/11) + Math.random()*0.3;
    f.rotation.z = -(0.35 + Math.random()*0.6);
    g.add(f);
  }
  g.position.set(x, 0, z); scene.add(g);
}

function makeLabel(text, big = false){
  const c = document.createElement('canvas'); c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(10,12,28,0.72)';
  ctx.font = 'bold 56px Arial';
  const w2 = ctx.measureText(text).width + 40;
  ctx.beginPath(); ctx.roundRect((512-w2)/2, 20, w2, 88, 18); ctx.fill();
  ctx.fillStyle = '#ffd34d'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 66);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map:t, transparent:true, depthTest:false }));
  const k = big ? 1.25 : 0.85;
  s.scale.set(k, k*0.25, 1); s.renderOrder = 999;
  return s;
}
function dimension(p1, p2, text, tick = new THREE.Vector3(0,0.1,0), big = false, labelOff = 0.22, parent = dims){
  const t1a = p1.clone().add(tick), t1b = p1.clone().sub(tick);
  const t2a = p2.clone().add(tick), t2b = p2.clone().sub(tick);
  const g = new THREE.BufferGeometry().setFromPoints([p1,p2, t1a,t1b, t2a,t2b]);
  parent.add(new THREE.LineSegments(g, dimLineMat));
  const lbl = makeLabel(text, big);
  lbl.position.copy(p1.clone().lerp(p2, 0.5)).add(new THREE.Vector3(0, labelOff, 0));
  parent.add(lbl);
}

btnL.onclick = () => {
  mesadaLGroup.visible = !mesadaLGroup.visible;
  btnL.classList.toggle('on', mesadaLGroup.visible);
};
btnLuz.onclick = () => {
  apliques.visible = !apliques.visible;
  btnLuz.classList.toggle('on', apliques.visible);
};
plc.addEventListener('lock', () => {
  orbit.enabled = false;
  btnWalk.classList.add('on'); btnOrbit.classList.remove('on');
  modeHelp.textContent = 'WASD / flechas = caminar · mouse = mirar · Esc = salir';
  camera.position.set(2.6, 1.62, 6.5);
});
plc.addEventListener('unlock', () => {
  orbit.enabled = true;
  btnOrbit.classList.add('on'); btnWalk.classList.remove('on');
  modeHelp.textContent = 'Arrastrá = rotar · rueda = zoom · click derecho = desplazar';
});

/* --- hora del día / sol (N=+x, E=+z, O=-z) --- */
let nf = 1, nightMode = true;
function setHour(h){
  let dayF = 0;
  if(h > 6 && h < 20) dayF = Math.max(0, Math.sin(Math.PI*(h-6)/14));
  nf = 1 - THREE.MathUtils.smoothstep(dayF, 0.04, 0.30);
  nightMode = dayF < 0.04;
  const th = Math.PI * THREE.MathUtils.clamp((h-6)/14, 0, 1);
  sun.castShadow = dayF > 0 && !LITE;
  if(dayF > 0){
    const alt = (Math.PI/180) * (6 + 60*dayF);
    const R = 26;
    sun.position.set(2 + R*Math.sin(th)*Math.cos(alt), Math.max(1.5, R*Math.sin(alt)), 4.6 + R*Math.cos(th)*Math.cos(alt));
    sun.color.lerpColors(new THREE.Color(0xff9a4d), new THREE.Color(0xfff3e0), Math.min(1, dayF*1.6));
    sun.intensity = 0.3 + 3.4*dayF;
  } else {
    sun.position.set(-6, 14, 9);
    sun.color.set(0x6a7ec9); sun.intensity = 0.25;
  }
  skyUni.uDay.value = dayF;
  starsMat.opacity = 0.85*(1-dayF);
  cityMat.opacity = 1 - 0.4*dayF;
  cityMat.color.lerpColors(new THREE.Color(0xffffff), new THREE.Color(0x9fb2cc), dayF);
  hemi.intensity = 0.4 + 1.9*dayF;
  amb.intensity = 0.35 + 0.45*dayF;
  renderer.toneMappingExposure = 1.15 - 0.15*dayF;
  scene.fog.color.lerpColors(new THREE.Color(0x0a1230), new THREE.Color(0xb9cce4), dayF);
  envMats.forEach(m => m.envMapIntensity = LITE ? 1 : 0.22 + 0.6*dayF);
  if(bloom) bloom.strength = 0.25 + 0.5*nf;
  warmPoints.forEach(o => o.light.intensity = o.base * Math.max(nf, 0.12));
  spotArr.forEach(o => o.light.intensity = o.base * Math.max(nf, 0.08));
  glowMats.forEach(m => m.opacity = 0.95 * Math.max(nf, 0.08));
  winGlass.emissiveIntensity = nightMode ? 0.7 : 0;
  fogon.visible = nightMode;
  tablePlant.visible = !nightMode;
  const hh = Math.floor(h), mm = Math.round((h-hh)*60);
  outHora.textContent = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}
function setLouvers(t){
  louvers.forEach(s => s.rotation.x = -(0.05 + 1.2*t));
  outAspas.textContent = Math.round(t*100) + '% abiertas';
}
function setPergola(v){
  pergola.position.z = v;
  outPerg.textContent = v < -0.25 ? 'tocando la pared del fondo'
    : (v < 0.04 ? 'al fondo (sobre el sillón)' : '+' + v.toFixed(2) + ' m al frente');
}
function setSofa(v){
  buildSofa(v);
  const pers = 2*Math.max(1, Math.round((v-0.65)/0.75)) + 1;
  outSofa.textContent = v.toFixed(2) + ' m · ~' + pers + ' pers.';
}
rngHora.addEventListener('input',  e => setHour(parseFloat(e.target.value)));
rngPerg.addEventListener('input',  e => setPergola(parseFloat(e.target.value)));
rngAspas.addEventListener('input', e => setLouvers(parseFloat(e.target.value)));
rngSofa.addEventListener('input',  e => setSofa(parseFloat(e.target.value)));
window.__setHour = setHour; window.__setPergola = setPergola; window.__setLouvers = setLouvers; window.__setSofa = setSofa;
setLouvers(0.7); setPergola(0); setSofa(2.15); setHour(21);

/* ---------- loop ---------- */
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  const k = Math.max(nf, 0.15);
  fire.intensity  = (2.2 + Math.sin(t*9.3)*0.5 + Math.sin(t*23.7)*0.3) * k;
  ember.intensity = (1.1 + Math.sin(t*7.1+2)*0.3) * k;
  flamePlanes.forEach(g => {
    const ph = g.userData.ph;
    g.scale.y = 1 + 0.26*Math.sin(t*10 + ph) + 0.1*Math.sin(t*23 + ph*2);
    g.scale.x = g.scale.z = 1 + 0.1*Math.sin(t*13 + ph*1.7);
    g.rotation.y += dt*0.6;
  });
  if(fogon.visible){
    fogonLight.intensity = 2.2 + Math.sin(t*11)*0.55 + Math.sin(t*23)*0.3;
  }
  if(plc.isLocked){
    const sp = 2.3*dt;
    const f = (keys.KeyW||keys.ArrowUp ? 1:0) - (keys.KeyS||keys.ArrowDown ? 1:0);
    const r = (keys.KeyD||keys.ArrowRight ? 1:0) - (keys.KeyA||keys.ArrowLeft ? 1:0);
    if(f) plc.moveForward(f*sp);
    if(r) plc.moveRight(r*sp);
    camera.position.x = THREE.MathUtils.clamp(camera.position.x, 0.85, W-0.45);
    camera.position.z = THREE.MathUtils.clamp(camera.position.z, 0.55, 8.3);
    if(camera.position.z > 7.45) camera.position.x = Math.min(camera.position.x, 1.9);
    camera.position.y = 1.62;
  } else {
    if(zoomTarget !== null){
      const d = camera.position.distanceTo(orbit.target);
      const nd = THREE.MathUtils.lerp(d, zoomTarget, Math.min(1, dt*9));
      if(Math.abs(nd-d) > 0.0005){
        camera.position.sub(orbit.target).multiplyScalar(nd/Math.max(d,1e-6)).add(orbit.target);
      }
      if(clock.elapsedTime - lastWheelT > 0.6) zoomTarget = null;  // re-sincroniza tras pinch/pan
    }
    orbit.update();
  }
  if(composer) composer.render(); else renderer.render(scene, camera);
});

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if(composer) composer.setSize(innerWidth, innerHeight);
});
</script>
